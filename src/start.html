<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self'; script-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Griffin Menu Studio</title>
<link rel="stylesheet" href="styles/app.css">
<link rel="stylesheet" href="styles/start.css">
</head>
<body>
<main class="start-shell">
  <section class="brand-panel">
    <img src="assets/full-lockup.png" alt="The Griffin">
    <div>
      <h1>Menu Studio</h1>
      <p>Choose a recent menu or start from a Griffin layout.</p>
    </div>
    <div class="brand-actions">
      <button class="primary" id="btnCreate">Create Menu</button>
      <button id="btnOpen">Open Menu</button>
    </div>
  </section>

  <section class="recent-panel">
    <div class="section-head">
      <h2>Recent Documents</h2>
      <span id="recentCount"></span>
    </div>
    <div class="recent-grid" id="recentGrid"></div>
  </section>

  <section class="template-panel" id="templates">
    <div class="section-head">
      <h2>Start From Template</h2>
      <span>Griffin Classics</span>
    </div>
    <div class="template-grid" id="templateGrid"></div>
  </section>
</main>
<script src="scripts/start.js"></script>
</body>
</html>
