<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; base-uri 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Griffin Menu Studio</title>
<style>
:root{--cream:#F6F2EA;--cream2:#FBF8F2;--line:#E2D8C8;--ink:#1B1A1E;--mut:#8A8074;--copper:#B4763B}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{display:grid;place-items:center;background:#efe7da;color:var(--ink);font-family:Georgia,'Times New Roman',serif;overflow:hidden;opacity:1;transition:opacity .22s ease}
body.leaving{opacity:0}
.shell{width:min(520px,82vw);display:grid;gap:22px;place-items:center}
.card{width:100%;aspect-ratio:2.72/1;display:grid;place-items:center;background:linear-gradient(180deg,var(--cream2),var(--cream));border:1px solid rgba(122,105,83,.18);border-radius:24px;box-shadow:0 22px 60px rgba(27,26,30,.18),0 2px 8px rgba(27,26,30,.08)}
.card img{display:block;width:86%;height:auto;max-height:76%;object-fit:contain}
.status{display:grid;gap:10px;place-items:center;min-height:54px;font:12px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:.18em;text-transform:uppercase;color:var(--mut)}
.status-main{min-width:250px;text-align:center}
.status-detail{font-size:10px;letter-spacing:.14em;color:#A69B8D;text-transform:none}
.ticks{display:flex;gap:6px}
.tick{width:22px;height:1px;background:#D5C9B8;transition:background .16s ease,transform .16s ease}
.tick.on{background:var(--copper);transform:scaleY(2)}
@media (prefers-reduced-motion:reduce){body,.tick{transition:none}}
@media (max-width:420px){.shell{width:86vw}.card{border-radius:20px}.card img{width:88%}}
</style>
</head>
<body>
<main class="shell">
  <section class="card" aria-label="The Griffin">
    <img src="assets/full-lockup.png" alt="The Griffin">
  </section>
  <section class="status" aria-live="polite">
    <div class="status-main" id="status">Preparing workspace</div>
    <div class="ticks" aria-hidden="true"><span class="tick on"></span><span class="tick"></span><span class="tick"></span><span class="tick"></span><span class="tick"></span></div>
    <div class="status-detail" id="detail">Griffin Menu Studio</div>
  </section>
</main>
<script src="scripts/splash.js"></script>
</body>
</html>
